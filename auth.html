<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — DestinyLens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #A94CF0 0%, #F6C26B 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        .logo-top {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .logo-bottom {
            font-size: 0.65rem;
            font-weight: 600;
            color: #F6C26B;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .auth-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: rgba(255,255,255,0.6);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #A94CF0;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #A94CF0 0%, #F6C26B 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(169, 76, 240, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.6);
        }
        
        .auth-switch a {
            color: #F6C26B;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-mark">
            <div class="logo-icon">DL</div>
            <div class="logo-text">
                <span class="logo-top">DestinyLens</span>
                <span class="logo-bottom">Your Dream Life In Focus</span>
            </div>
        </a>
    </nav>
    
    <div class="container">
        <div class="auth-box">
            <div class="auth-header">
                <h1 id="authTitle">Welcome Back</h1>
                <p id="authSubtitle">Sign in to access your Dream Life Dashboard</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn" id="submitBtn">Sign In</button>
            </form>
            
            <div class="auth-switch">
                <span id="switchText">Don't have an account?</span>
                <a id="switchLink">Sign up</a>
            </div>
        </div>
    </div>
    
    <script>
        let isSignIn = true;
        
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const switchText = document.getElementById('switchText');
        const switchLink = document.getElementById('switchLink');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }
        
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }
        
        function clearMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }
        
        function toggleMode() {
            isSignIn = !isSignIn;
            
            if (isSignIn) {
                authTitle.textContent = 'Welcome Back';
                authSubtitle.textContent = 'Sign in to access your Dream Life Dashboard';
                submitBtn.textContent = 'Sign In';
                switchText.textContent = "Don't have an account?";
                switchLink.textContent = 'Sign up';
            } else {
                authTitle.textContent = 'Create Your Account';
                authSubtitle.textContent = 'Start calculating your Dream Life Number';
                submitBtn.textContent = 'Create Account';
                switchText.textContent = 'Already have an account?';
                switchLink.textContent = 'Sign in';
            }
            
            clearMessages();
        }
        
        switchLink.addEventListener('click', (e) => {
            e.preventDefault();
            toggleMode();
        });
        
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = isSignIn ? 'Signing in...' : 'Creating account...';
            
            try {
                let result;
                
                if (isSignIn) {
                    result = await signIn(email, password);
                } else {
                    result = await signUp(email, password);
                }
                
                if (result.error) {
                    showError(result.error.message);
                } else {
                    if (isSignIn) {
                        // Get return URL from query params
                        const urlParams = new URLSearchParams(window.location.search);
                        const returnTo = urlParams.get('returnTo') || '/members.html';
                        window.location.href = returnTo;
                    } else {
                        showSuccess('Account created! Please check your email to confirm, then sign in.');
                        setTimeout(() => {
                            toggleMode();
                        }, 2000);
                    }
                }
            } catch (err) {
                showError('An unexpected error occurred. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignIn ? 'Sign In' : 'Create Account';
            }
        });
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const { user } = await getCurrentUser();
            if (user) {
                window.location.href = '/members.html';
            }
        });
    </script>
</body>
</html>
