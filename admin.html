<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — DestinyLens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --purple: #A94CF0; --gold: #F6C26B; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
        }
        
        .admin-header {
            background: linear-gradient(135deg, rgba(169, 76, 240, 0.2) 0%, rgba(246, 194, 107, 0.1) 100%);
            border-bottom: 1px solid rgba(169, 76, 240, 0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .admin-badge {
            background: var(--purple);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .nav-links { display: flex; gap: 24px; }
        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 600;
        }
        .nav-links a:hover { color: var(--gold); }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
        }
        
        .section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        th {
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-active {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        
        .status-inactive {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255,255,255,0.6);
        }
        
        .access-denied {
            text-align: center;
            padding: 100px 20px;
        }
        
        .access-denied h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }
        
        .access-denied p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Content loaded by JS -->
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        // Initialize
        initSupabase();
        
        async function checkAdminAccess() {
            const { user } = await getCurrentUser();
            
            if (!user) {
                window.location.href = '/auth.html?returnTo=/admin.html';
                return false;
            }
            
            // Check if user has admin role
            const { data: profile, error } = await supabaseClient
                .from('user_profiles')
                .select('role')
                .eq('id', user.id)
                .single();
            
            if (error || !profile || profile.role !== 'admin') {
                renderAccessDenied();
                return false;
            }
            
            return true;
        }
        
        function renderAccessDenied() {
            document.getElementById('app').innerHTML = `
                <div class="access-denied">
                    <h1>⛔ Access Denied</h1>
                    <p>You don't have permission to access the admin panel.</p>
                    <a href="/members.html" class="btn">Return to Dashboard</a>
                </div>
            `;
        }
        
        async function renderAdminPanel() {
            const hasAccess = await checkAdminAccess();
            if (!hasAccess) return;
            
            // Load stats
            const stats = await loadStats();
            
            document.getElementById('app').innerHTML = `
                <div class="admin-header">
                    <div class="admin-title">
                        <h1>DestinyLens Admin</h1>
                        <span class="admin-badge">Admin</span>
                    </div>
                    <div class="nav-links">
                        <a href="/dashboard.html">Dashboard</a>
                        <a href="/members.html">Members</a>
                        <a href="#" onclick="logout()">Logout</a>
                    </div>
                </div>
                
                <div class="container">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${stats.totalUsers}</div>
                            <div class="stat-label">Total Users</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.activeUsers}</div>
                            <div class="stat-label">Active Today</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.premiumUsers}</div>
                            <div class="stat-label">Premium Members</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${stats.publicShares}</div>
                            <div class="stat-label">Public Shares</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">
                            <span>👥 Recent Users</span>
                            <button class="btn btn-secondary" onclick="refreshUsers()">Refresh</button>
                        </div>
                        <div class="search-box">
                            <input type="text" id="userSearch" placeholder="Search users by email...">
                            <button class="btn" onclick="searchUsers()">Search</button>
                        </div>
                        <div id="usersTable">
                            <p>Loading users...</p>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">
                            <span>💰 Recent Subscriptions</span>
                        </div>
                        <div id="subscriptionsTable">
                            <p>Loading subscriptions...</p>
                        </div>
                    </div>
                </div>
            `;
            
            await loadUsers();
            await loadSubscriptions();
        }
        
        async function loadStats() {
            // Get total users
            const { count: totalUsers } = await supabaseClient
                .from('user_profiles')
                .select('*', { count: 'exact', head: true });
            
            // Get active users today
            const today = new Date().toISOString().split('T')[0];
            const { count: activeUsers } = await supabaseClient
                .from('user_profiles')
                .select('*', { count: 'exact', head: true })
                .gte('last_active', today);
            
            // Get premium users
            const { count: premiumUsers } = await supabaseClient
                .from('user_subscriptions')
                .select('*', { count: 'exact', head: true })
                .eq('status', 'active');
            
            // Get public shares
            const { count: publicShares } = await supabaseClient
                .from('dashboard_settings')
                .select('*', { count: 'exact', head: true })
                .eq('public_share_enabled', true);
            
            return {
                totalUsers: totalUsers || 0,
                activeUsers: activeUsers || 0,
                premiumUsers: premiumUsers || 0,
                publicShares: publicShares || 0
            };
        }
        
        async function loadUsers() {
            const { data: users, error } = await supabaseClient
                .from('user_profiles')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(20);
            
            if (error) {
                document.getElementById('usersTable').innerHTML = '<p>Error loading users</p>';
                return;
            }
            
            if (!users || users.length === 0) {
                document.getElementById('usersTable').innerHTML = '<p>No users found</p>';
                return;
            }
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.email || 'N/A'}</td>
                                <td>${u.role || 'user'}</td>
                                <td><span class="status-badge ${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                                <td><button class="btn btn-secondary" onclick="viewUser('${u.id}')">View</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('usersTable').innerHTML = html;
        }
        
        async function loadSubscriptions() {
            const { data: subs, error } = await supabaseClient
                .from('user_subscriptions')
                .select('*, user_profiles(email)')
                .order('created_at', { ascending: false })
                .limit(10);
            
            if (error || !subs || subs.length === 0) {
                document.getElementById('subscriptionsTable').innerHTML = '<p>No subscriptions found</p>';
                return;
            }
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Amount</th>
                            <th>Renews</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${subs.map(s => `
                            <tr>
                                <td>${s.user_profiles?.email || 'N/A'}</td>
                                <td>${s.plan_type}</td>
                                <td><span class="status-badge ${s.status === 'active' ? 'status-active' : 'status-inactive'}">${s.status}</span></td>
                                <td>$${s.amount || 0}/${s.interval || 'mo'}</td>
                                <td>${s.current_period_end ? new Date(s.current_period_end).toLocaleDateString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('subscriptionsTable').innerHTML = html;
        }
        
        async function searchUsers() {
            const query = document.getElementById('userSearch').value;
            if (!query) {
                loadUsers();
                return;
            }
            
            const { data: users, error } = await supabaseClient
                .from('user_profiles')
                .select('*')
                .ilike('email', `%${query}%`)
                .limit(20);
            
            if (error || !users) {
                document.getElementById('usersTable').innerHTML = '<p>No users found</p>';
                return;
            }
            
            // Re-render with search results
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.email || 'N/A'}</td>
                                <td>${u.role || 'user'}</td>
                                <td><span class="status-badge ${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                                <td><button class="btn btn-secondary" onclick="viewUser('${u.id}')">View</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('usersTable').innerHTML = html;
        }
        
        function viewUser(userId) {
            alert('User detail view not yet implemented for: ' + userId);
        }
        
        function refreshUsers() {
            loadUsers();
        }
        
        async function logout() {
            await signOut();
            window.location.href = '/';
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', renderAdminPanel);
    </script>
</body>
</html>
