<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Locked — DestinyLens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/entitlements.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --purple: #A94CF0; --gold: #F6C26B; }
        
        body {
            background: #0a0a12;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
        }
        
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 900;
        }
        
        .logo-text { display: flex; flex-direction: column; }
        .logo-top { font-size: 1rem; font-weight: 800; text-transform: uppercase; }
        .logo-bottom { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; }
        
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .locked-box {
            text-align: center;
            max-width: 500px;
        }
        
        .lock-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        .locked-box h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 16px;
        }
        
        .locked-box p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            margin: 8px;
            transition: transform 0.2s;
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo-mark">
            <div class="logo-icon">DL</div>
            <div class="logo-text">
                <span class="logo-top">DestinyLens</span>
                <span class="logo-bottom">Your Dream Life In Focus</span>
            </div>
        </a>
    </nav>
    
    <div class="container">
        <div class="locked-box">
            <div class="lock-icon">🔒</div>
            <h1>Dream Life Dashboard</h1>
            <p>This feature is part of your premium Dream Life tools. Your dashboard helps you calculate your Dream Life Number, create a personalized visual board, and track your real income progress toward your daily goal.</p>
            <button class="btn" id="upgradeBtn" onclick="handleUpgrade()">Upgrade to Access</button>
            <a href="/members.html" class="btn btn-secondary">Return to Dashboard</a>
        </div>
    </div>
    <script>
        // Get feature from URL
        const urlParams = new URLSearchParams(window.location.search);
        const feature = urlParams.get('feature') || 'dream_life_dashboard';
        
        // Update page content based on feature
        const featureNames = {
            'dream_life_dashboard': 'Dream Life Dashboard',
            'dream_life_calculator': 'Dream Life Calculator',
            'abundance_playground_premium': 'Abundance Playground Premium',
            'future_self_oracle_member': 'Future Self Oracle'
        };
        
        document.querySelector('h1').textContent = featureNames[feature] || 'Premium Feature';
        
        async function handleUpgrade() {
            // TODO: Replace with actual Stripe price ID
            const priceIds = {
                'dream_life_dashboard': 'price_dashboard_monthly',
                'dream_life_calculator': 'price_calculator_onetime',
                'abundance_playground_premium': 'price_premium_monthly',
                'future_self_oracle_member': 'price_oracle_monthly'
            };
            
            const priceId = priceIds[feature];
            if (!priceId) {
                alert('Please contact support to upgrade.');
                return;
            }
            
            // Show loading
            const btn = document.getElementById('upgradeBtn');
            btn.textContent = 'Loading...';
            btn.disabled = true;
            
            // Create checkout session
            const { error } = await createCheckoutSession(priceId);
            
            if (error) {
                alert('Error: ' + error.message);
                btn.textContent = 'Upgrade to Access';
                btn.disabled = false;
            }
            // Otherwise redirects to Stripe
        }
    </script>
</body>
</html>
