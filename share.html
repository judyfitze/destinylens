<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Dream Life Dashboard — DestinyLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --purple: #A94CF0; --gold: #F6C26B; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Background Layer */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        .bg-layer img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: opacity 0.5s ease;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10,10,18,0.85) 0%, rgba(10,10,18,0.7) 50%, rgba(10,10,18,0.9) 100%);
            z-index: 1;
        }
        
        /* App Container */
        .app {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Public Banner */
        .public-banner {
            background: linear-gradient(135deg, rgba(169, 76, 240, 0.3) 0%, rgba(246, 194, 107, 0.2) 100%);
            border-bottom: 1px solid rgba(169, 76, 240, 0.3);
            padding: 12px 20px;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }
        .public-banner a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Header */
        .share-header {
            text-align: center;
            margin-bottom: 10px;
        }
        .share-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .share-header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            text-shadow: 0 1px 10px rgba(0,0,0,0.5);
        }
        
        /* Dashboard Panel */
        .dashboard-panel {
            background: rgba(10, 10, 18, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }
        
        .panel-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .panel-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .panel-subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
        
        /* Daily Target */
        .daily-target {
            text-align: center;
            margin-bottom: 24px;
        }
        .daily-target-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .daily-target-amount {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Metrics */
        .metrics {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .metric-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 120px;
            text-align: center;
        }
        .metric-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .metric-value.highlight {
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Progress Gauge */
        .gauge-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 24px;
        }
        .gauge-box {
            position: relative;
            width: 160px;
            height: 160px;
        }
        .gauge-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .gauge-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 10;
        }
        .gauge-progress {
            fill: none;
            stroke: url(#gaugeGradient);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 1s ease;
        }
        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .gauge-percent {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gauge-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }
        
        /* Goals Section */
        .goals-area {
            margin-top: 10px;
        }
        .goals-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .goals-heading {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .goals-grid {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .goal-card {
            width: 240px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .goal-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .goal-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .goal-emoji { font-size: 1.1rem; margin-bottom: 2px; }
        .goal-name { font-weight: 700; font-size: 0.85rem; }
        .goal-amt { color: var(--gold); font-weight: 600; font-size: 0.75rem; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        .footer a {
            color: var(--gold);
            text-decoration: none;
        }
        
        /* Error States */
        .locked-message {
            text-align: center;
            padding: 100px 20px;
        }
        .locked-message h2 {
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        .locked-message p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .main { padding: 20px; }
            .gauge-wrap { flex-direction: column; }
            .goal-card { width: calc(50% - 8px); }
        }
    </style>
</head>
<body>
    <!-- SVG Gradient -->
    <svg width="0" height="0">
        <defs>
            <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#A94CF0"/>
                <stop offset="100%" style="stop-color:#F6C26B"/>
            </linearGradient>
        </defs>
    </svg>
    
    <!-- Background -->
    <div class="bg-layer">
        <img id="bgImage" src="dashboard-preview.jpg" alt="">
        <div class="bg-overlay"></div>
    </div>
    
    <!-- App -->
    <div class="app">
        <div class="public-banner">
            This is a public share of a private Dream Life Dashboard. 
            <a href="/">Create your own</a>
        </div>
        
        <div class="main" id="mainContent">
            <!-- Content loaded dynamically -->
        </div>
        
        <div class="footer">
            Powered by <a href="/">DestinyLens</a> — Calculate your Dream Life Number
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nfyabrvkqgzuzxjetqbe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meWFicnZrcWd6dXp4amV0cWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjAxMzYsImV4cCI6MjA5NDE5NjEzNn0.BmpDxYXwPNR1RftmjtKIqpE5h3Ljkn5gaGmHkFDfTm0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const pathParts = window.location.pathname.split('/');
        const shareSlug = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
        
        async function loadSharedDashboard() {
            try {
                // Get dashboard settings
                const { data: settings, error: settingsError } = await supabaseClient
                    .from('dashboard_settings')
                    .select('*')
                    .eq('public_share_slug', shareSlug)
                    .eq('public_share_enabled', true)
                    .single();
                
                if (settingsError || !settings) {
                    console.error('Settings error:', settingsError);
                    showNotFound();
                    return;
                }
                
                // Get calculation separately
                let calculation = null;
                if (settings.active_calculation_id) {
                    const { data: calc } = await supabaseClient
                        .from('dream_life_calculations')
                        .select('*')
                        .eq('id', settings.active_calculation_id)
                        .single();
                    calculation = calc;
                }
                
                // If no active calculation, try to get user's latest
                if (!calculation) {
                    const { data: calc } = await supabaseClient
                        .from('dream_life_calculations')
                        .select('*')
                        .eq('user_id', settings.user_id)
                        .eq('is_active', true)
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .single();
                    calculation = calc;
                }
                
                // Get goals
                let goals = [];
                if (settings.show_goal_cards_publicly !== false) {
                    const { data: goalsData } = await supabaseClient
                        .from('goal_cards')
                        .select('*')
                        .eq('user_id', settings.user_id)
                        .eq('visible', true)
                        .order('sort_order', { ascending: true })
                        .limit(4);
                    goals = goalsData || [];
                }
                
                renderDashboard(settings, calculation, goals);
                
            } catch (err) {
                console.error('Error:', err);
                showError();
            }
        }
        
        function renderDashboard(settings, calc, goals) {
            // Set background
            if (settings.background_image_url) {
                document.getElementById('bgImage').src = settings.background_image_url;
            }
            
            const daily = calc?.daily_total || 0;
            const monthly = calc?.monthly_total || 0;
            const weekly = calc?.weekly_total || 0;
            const yearly = calc?.yearly_total || 0;
            
            // Build HTML
            let html = `
                <div class="share-header">
                    <h1>${settings.dashboard_title || 'Dream Life Dashboard'}</h1>
                    <p>${settings.dashboard_subtitle || 'Living the dream, one day at a time'}</p>
                </div>
                
                <div class="dashboard-panel">
                    <div class="panel-header">
                        <div class="panel-title">Dream Life Dashboard</div>
                        <div class="panel-subtitle">Financial Command Center</div>
                    </div>
                    
                    <div class="daily-target">
                        <div class="daily-target-label">Daily Income Target</div>
                        <div class="daily-target-amount">${formatCurrency(daily)}</div>
                    </div>
                    
                    <div class="gauge-wrap">
                        <div class="gauge-box">
                            <svg class="gauge-svg" viewBox="0 0 140 140">
                                <circle class="gauge-bg" cx="70" cy="70" r="60"></circle>
                                <circle class="gauge-progress" id="gaugeProgress" cx="70" cy="70" r="60" stroke-dashoffset="377"></circle>
                            </svg>
                            <div class="gauge-center">
                                <div class="gauge-percent" id="gaugePercent">0%</div>
                                <div class="gauge-label">Progress</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="metrics">
                        <div class="metric-card">
                            <div class="metric-label">Weekly</div>
                            <div class="metric-value">${formatCurrency(weekly)}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Monthly</div>
                            <div class="metric-value highlight">${formatCurrency(monthly)}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">Yearly</div>
                            <div class="metric-value">${formatCurrency(yearly)}</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Add goals section
            if (settings.show_goal_cards_publicly !== false && goals.length > 0) {
                html += `
                    <div class="goals-area">
                        <div class="goals-bar">
                            <span class="goals-heading">🎯 My Dream Life Goals</span>
                        </div>
                        <div class="goals-grid">
                            ${goals.map(g => `
                                <div class="goal-card">
                                    <img src="${g.image_url || 'dashboard-preview.jpg'}" alt="">
                                    <div class="goal-overlay">
                                        <div class="goal-emoji">${g.icon || '🎯'}</div>
                                        <div class="goal-name">${g.title}</div>
                                        <div class="goal-amt">${formatCurrency(g.monthly_amount)}/mo</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('mainContent').innerHTML = html;
            
            // Animate gauge after render
            setTimeout(() => {
                const progress = Math.min(100, Math.random() * 30 + 10); // Demo progress
                const offset = 377 - (377 * progress / 100);
                const gauge = document.getElementById('gaugeProgress');
                if (gauge) gauge.style.strokeDashoffset = offset;
                const percent = document.getElementById('gaugePercent');
                if (percent) percent.textContent = Math.round(progress) + '%';
            }, 100);
        }
        
        function formatCurrency(num) {
            if (!num || isNaN(num)) return '$0.00';
            return '$' + parseFloat(num).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        function showNotFound() {
            document.getElementById('mainContent').innerHTML = `
                <div class="locked-message">
                    <h2>🔒 Dashboard Not Found</h2>
                    <p>This share link may have expired or been disabled by the owner.</p>
                    <a href="/" class="btn">Create Your Own Dashboard</a>
                </div>
            `;
        }
        
        function showError() {
            document.getElementById('mainContent').innerHTML = `
                <div class="locked-message">
                    <h2>⚠️ Error Loading Dashboard</h2>
                    <p>Something went wrong. Please try again later.</p>
                    <a href="/" class="btn">Go Home</a>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', loadSharedDashboard);
    </script>
</body>
</html>
