<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Dream Life Dashboard — DestinyLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --purple: #A94CF0; --gold: #F6C26B; }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        /* Background Layer */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        .bg-layer img { width: 100%; height: 100%; object-fit: cover; }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10,10,18,0.75) 0%, rgba(10,10,18,0.5) 50%, rgba(10,10,18,0.85) 100%);
            z-index: 1;
        }
        
        /* App Container - Full Screen */
        .app {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }
        
        /* Public Banner - Compact */
        .public-banner {
            background: linear-gradient(135deg, rgba(169, 76, 240, 0.3) 0%, rgba(246, 194, 107, 0.2) 100%);
            border-bottom: 1px solid rgba(169, 76, 240, 0.3);
            padding: 8px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .public-banner a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Main Content - Flexible */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 15px;
            overflow: hidden;
            gap: 15px;
        }
        
        /* Top Metrics - Horizontal */
        .metrics {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-shrink: 0;
            padding-top: 10px;
        }
        .metric-card {
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 16px;
            min-width: 100px;
            text-align: center;
        }
        .metric-label { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
        .metric-value { font-size: 1.1rem; font-weight: 800; }
        .metric-value.highlight {
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Middle Section - Dashboard Panel */
        .dashboard-panel {
            display: flex;
            gap: 20px;
            flex-shrink: 0;
            justify-content: flex-start;
        }
        
        /* Left Panel - Compact */
        .panel {
            width: 300px;
            background: rgba(10, 10, 18, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(169, 76, 240, 0.3);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .panel-header { margin-bottom: 15px; }
        .panel-title {
            font-size: 1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .panel-subtitle {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        /* Daily Target */
        .daily-target {
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, rgba(169, 76, 240, 0.2) 0%, rgba(246, 194, 107, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(169, 76, 240, 0.3);
            margin-bottom: 15px;
        }
        .daily-target-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.12em; }
        .daily-target-amount {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Gauge */
        .gauge-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .gauge-box {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }
        .gauge-svg {
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; }
        .gauge-progress {
            fill: none;
            stroke: url(#gaugeGradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 1s ease;
        }
        .gauge-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .gauge-percent {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gauge-label { font-size: 0.6rem; color: rgba(255,255,255,0.5); }
        
        /* Income Mini */
        .income-mini {
            flex: 1;
        }
        .income-mini-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .income-mini-title { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.7); }
        .income-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .income-row:last-child { border-bottom: none; }
        .income-label { color: rgba(255,255,255,0.5); }
        .income-val { font-weight: 700; }
        
        /* Goals Section - Bottom */
        .goals-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .goals-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .goals-heading {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        /* Goals Grid */
        .goals-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-start;
            align-content: flex-start;
            overflow-y: auto;
        }
        .goal-card {
            width: calc(25% - 12px);
            min-width: 180px;
            max-width: 240px;
            aspect-ratio: 16/10;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .goal-card img { width: 100%; height: 100%; object-fit: cover; }
        .goal-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .goal-emoji { font-size: 1.1rem; margin-bottom: 2px; }
        .goal-name { font-weight: 700; font-size: 0.85rem; }
        .goal-amt { color: var(--gold); font-weight: 600; font-size: 0.75rem; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .footer a {
            color: var(--gold);
            text-decoration: none;
        }
        
        /* Locked Message */
        .locked-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        .locked-message h2 {
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        .locked-message p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--gold) 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
        }
        
        @media (max-width: 1200px) {
            .goal-card { width: calc(33.33% - 10px); }
        }
        @media (max-width: 900px) {
            .goal-card { width: calc(50% - 8px); }
            .panel { width: 280px; }
        }
        @media (max-width: 768px) {
            .dashboard-panel { flex-direction: column; }
            .panel { width: 100%; }
            .goal-card { width: calc(50% - 8px); min-width: 140px; }
        }
    </style>
</head>
<body>
    <!-- SVG Gradient -->
    <svg width="0" height="0">
        <defs>
            <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#A94CF0"/>
                <stop offset="100%" style="stop-color:#F6C26B"/>
            </linearGradient>
        </defs>
    </svg>
    
    <!-- Background -->
    <div class="bg-layer">
        <img id="bgImage" src="dashboard-preview.jpg" alt="">
        <div class="bg-overlay"></div>
    </div>
    
    <!-- App -->
    <div class="app">
        <div class="public-banner">
            This is a public share of a private Dream Life Dashboard. 
            <a href="/">Create your own</a>
        </div>
        
        <div class="main" id="mainContent">
            <!-- Content loaded dynamically -->
        </div>
        
        <div class="footer">
            Powered by <a href="/">DestinyLens</a> — Calculate your Dream Life Number
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nfyabrvkqgzuzxjetqbe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5meWFicnZrcWd6dXp4amV0cWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjAxMzYsImV4cCI6MjA5NDE5NjEzNn0.BmpDxYXwPNR1RftmjtKIqpE5h3Ljkn5gaGmHkFDfTm0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Parse slug from URL: /share/SLUG
        const pathParts = window.location.pathname.split('/').filter(p => p && p !== 'share.html');
        let shareSlug = '';
        
        // Find 'share' in path and get next part
        const shareIndex = pathParts.indexOf('share');
        if (shareIndex >= 0 && pathParts[shareIndex + 1]) {
            shareSlug = pathParts[shareIndex + 1];
        } else if (pathParts.length > 0) {
            // Last resort: last segment
            shareSlug = pathParts[pathParts.length - 1];
        }
        
        console.log('Share slug:', shareSlug, 'Path:', window.location.pathname, 'Parts:', pathParts);
        
        async function loadSharedDashboard() {
            try {
                // Get dashboard settings
                const { data: settings, error: settingsError } = await supabaseClient
                    .from('dashboard_settings')
                    .select('*')
                    .eq('public_share_slug', shareSlug)
                    .eq('public_share_enabled', true)
                    .single();
                
                if (settingsError || !settings) {
                    console.error('Settings error:', settingsError);
                    showNotFound();
                    return;
                }
                
                // Get calculation separately
                let calculation = null;
                if (settings.active_calculation_id) {
                    const { data: calc } = await supabaseClient
                        .from('dream_life_calculations')
                        .select('*')
                        .eq('id', settings.active_calculation_id)
                        .single();
                    calculation = calc;
                }
                
                // If no active calculation, try to get user's latest
                if (!calculation) {
                    const { data: calc } = await supabaseClient
                        .from('dream_life_calculations')
                        .select('*')
                        .eq('user_id', settings.user_id)
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .single();
                    calculation = calc;
                }
                
                // Get goals
                let goals = [];
                if (settings.show_goal_cards_publicly !== false) {
                    const { data: dbGoals } = await supabaseClient
                        .from('goal_cards')
                        .select('*')
                        .eq('user_id', settings.user_id)
                        .order('sort_order', { ascending: true });
                    
                    if (dbGoals && dbGoals.length > 0) {
                        goals = dbGoals;
                    } else if (calculation) {
                        // Generate from calculation
                        const map = [
                            {k: 'home', i: '🏖️', t: 'Dream Home'},
                            {k: 'vehicle', i: '🚗', t: 'Dream Vehicle'},
                            {k: 'travel', i: '✈️', t: 'Travel'},
                            {k: 'food', i: '🍽️', t: 'Food & Dining'}
                        ];
                        goals = map.map(g => ({
                            icon: g.i, title: g.t,
                            monthly_amount: calculation[g.k + '_monthly_amount'] || 0,
                            image_url: 'dashboard-preview.jpg'
                        })).filter(g => g.monthly_amount > 0).slice(0, 4);
                    }
                }
                
                renderDashboard(settings, calculation, goals);
                
            } catch (err) {
                console.error('Error loading dashboard:', err);
                showError();
            }
        }
        
        function renderDashboard(settings, calc, goals) {
            // Set background with fallback
            const bgImage = document.getElementById('bgImage');
            if (settings.background_image_url) {
                bgImage.src = settings.background_image_url;
                bgImage.onerror = function() {
                    bgImage.src = 'dashboard-preview.jpg';
                };
            }
            
            const daily = calc?.daily_total || 0;
            const weekly = calc?.weekly_total || 0;
            const monthly = calc?.monthly_total || 0;
            const yearly = calc?.yearly_total || 0;
            
            let html = `
                <!-- Top Metrics -->
                <div class="metrics">
                    <div class="metric-card">
                        <div class="metric-label">Weekly</div>
                        <div class="metric-value">${formatCurrency(weekly)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Monthly</div>
                        <div class="metric-value highlight">${formatCurrency(monthly)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Yearly</div>
                        <div class="metric-value">${formatCurrency(yearly)}</div>
                    </div>
                </div>
                
                <!-- Dashboard Panel -->
                <div class="dashboard-panel">
                    <div class="panel">
                        <div class="panel-header">
                            <div class="panel-title">Financial Command Center</div>
                            <div class="panel-subtitle">Dream Life Targets</div>
                        </div>
                        
                        <div class="daily-target">
                            <div class="daily-target-label">Daily Income Target</div>
                            <div class="daily-target-amount">${formatCurrency(daily)}</div>
                        </div>
                        
                        <div class="gauge-wrap">
                            <div class="gauge-box">
                                <svg class="gauge-svg" viewBox="0 0 120 120">
                                    <circle class="gauge-bg" cx="60" cy="60" r="54"/>
                                    <circle class="gauge-progress" id="gaugeProgress" cx="60" cy="60" r="54"/>
                                </svg>
                                <div class="gauge-center">
                                    <div class="gauge-percent" id="gaugePercent">0%</div>
                                    <div class="gauge-label">Progress</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Add goals section
            if (settings.show_goal_cards_publicly !== false && goals.length > 0) {
                html += `
                    <div class="goals-area">
                        <div class="goals-bar">
                            <span class="goals-heading">🎯 My Dream Life Goals</span>
                        </div>
                        <div class="goals-grid">
                            ${goals.map((g, idx) => `
                                <div class="goal-card">
                                    <img src="${g.image_url || 'dashboard-preview.jpg'}" alt="${g.title}" onerror="this.src='dashboard-preview.jpg'">
                                    <div class="goal-info">
                                        <div class="goal-emoji">${g.icon || '🎯'}</div>
                                        <div class="goal-name">${g.title}</div>
                                        <div class="goal-amt">${formatCurrency(g.monthly_amount)}/mo</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('mainContent').innerHTML = html;
            
            // Animate gauge
            setTimeout(() => {
                const progress = Math.min(100, Math.random() * 30 + 10);
                const offset = 377 - (377 * progress / 100);
                const gauge = document.getElementById('gaugeProgress');
                if (gauge) gauge.style.strokeDashoffset = offset;
                const percent = document.getElementById('gaugePercent');
                if (percent) percent.textContent = Math.round(progress) + '%';
            }, 100);
        }
        
        function formatCurrency(num) {
            if (!num || isNaN(num)) return '$0.00';
            return '$' + parseFloat(num).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        function showNotFound() {
            document.getElementById('mainContent').innerHTML = `
                <div class="locked-message">
                    <h2>🔒 Dashboard Not Found</h2>
                    <p>This share link may have expired or been disabled by the owner.</p>
                    <a href="/" class="btn">Create Your Own Dashboard</a>
                </div>
            `;
        }
        
        function showError() {
            document.getElementById('mainContent').innerHTML = `
                <div class="locked-message">
                    <h2>⚠️ Error Loading Dashboard</h2>
                    <p>Something went wrong. Please try again later.</p>
                    <a href="/" class="btn">Go Home</a>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', loadSharedDashboard);
    </script>
</body>
</html>
