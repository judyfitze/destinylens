<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DestinyLens — Your Dream Life In Focus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #A94CF0 0%, #F6C26B 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.02em;
            box-shadow: 0 4px 20px rgba(169, 76, 240, 0.3), 0 2px 8px rgba(246, 194, 107, 0.2);
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .logo-top {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1;
        }
        .logo-bottom {
            font-size: 0.7rem;
            font-weight: 600;
            color: #F6C26B;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.9;
        }
        .hero {
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #F6C26B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #A94CF0 0%, #F6C26B 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 20px rgba(169, 76, 240, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(169, 76, 240, 0.5);
        }
        .coming-soon {
            margin-top: 60px;
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(169, 76, 240, 0.3);
            border-radius: 12px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <a href="/" class="logo-mark">
        <div class="logo-icon">DL</div>
        <div class="logo-text">
            <span class="logo-top">DestinyLens</span>
            <span class="logo-bottom">Your Dream Life In Focus</span>
        </div>
    </a>
    
    <div class="hero">
        <h1>Your Dream Life, In Focus</h1>
        <p>Calculate your Dream Life Number. Generate your personalized vision board. Track your daily income progress toward the life you're designing.</p>
        <a href="#" class="cta-button">Get Early Access</a>
    </div>
    
    <div class="coming-soon">
        🚀 Coming Soon — Dream Life Calculator + Financial Dashboard
    </div>
</body>
</html>
